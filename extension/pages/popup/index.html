<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulk FB Media Download</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #18191a;
        color: #e4e6eb;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid #3a3b3c;
      }
      .header img {
        width: 28px;
        height: 28px;
        border-radius: 6px;
      }
      .header-text h1 {
        font-size: 13px;
        font-weight: 600;
      }
      .header-text span {
        font-size: 11px;
        color: #8a8d91;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #31a24c;
        box-shadow: 0 0 6px #31a24c;
        flex-shrink: 0;
      }
      .status p {
        font-size: 12px;
        color: #b0b3b8;
      }
      .howto {
        padding: 0 16px 14px;
        font-size: 11px;
        color: #8a8d91;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img id="icon" src="/assets/icons/favicon-48.png" alt="icon" />
      <div class="header-text">
        <h1>Bulk FB Media Download</h1>
        <span id="version">v4.9.1</span>
      </div>
    </div>
    <div class="status">
      <div class="dot"></div>
      <p>Extension active on Facebook</p>
    </div>
    <div class="howto">
      Navigate to a Facebook album, profile photos, or group photos page — the
      download button appears automatically.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
